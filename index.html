<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Suby</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.383.0/umd/lucide.min.js"></script>
<style>
:root{
  --f:'Geist',system-ui,sans-serif;--m:'Geist Mono',monospace;
  --bg:#fff;--bg2:#f9f9f9;--bg3:#f1f1f1;
  --tx:#111;--tx2:#555;--tx3:#999;
  --bd:#e6e6e6;--bd2:#d4d4d4;
  --r:6px;--r2:10px;
  --sh:0 1px 2px rgba(0,0,0,.04);--sh2:0 12px 40px rgba(0,0,0,.10);
  /* green = ok / paid / active */
  --g:#287a50;--gl:#f1f8f4;--gb:#bee8d0;
  /* red = danger / cancel / remove */
  --re:#b03030;--rl:#fdf3f3;--rb:#f5c4c4;
  /* blue-mid = warning / attention (replaces amber) */
  --am:#4a6fa5;--al:#eef3fa;--ab:#b8cce4;
  /* orange = pending */
  --or:#c96a1a;--ol:#fef3e8;--ob:#f8d4aa;
  /* slate = primary brand / info / neutral accent */
  --bl:#3d5a80;--bll:#eef2f8;--blb:#b8cce4;
  /* deep = secondary accent (replaces purple) */
  --pu:#2e4a6a;--pul:#e8eef6;--pub:#a8bdd4;
  --sb:220px;--tb:50px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--f);background:var(--bg2);color:var(--tx);font-size:13px;line-height:1.5}

/* TOPBAR */
.topbar{height:var(--tb);background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:fixed;top:0;left:0;right:0;z-index:200}
.tl{display:flex;align-items:center;gap:8px}
.logo{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--tx);letter-spacing:-.02em}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:500;font-family:var(--f);cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--tx2);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg3);color:var(--tx)}
.btn-p{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.btn-p:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:11px}

/* SIDEBAR */
.sidebar{width:var(--sb);height:calc(100vh - var(--tb));background:var(--bg);border-right:1px solid var(--bd);position:fixed;top:var(--tb);left:0;display:flex;flex-direction:column;overflow:hidden;z-index:100}
.sb-org{padding:10px 10px 8px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-orgbtn{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:var(--r);cursor:pointer;border:none;background:none;font-family:var(--f);width:100%;transition:background .1s}
.sb-orgbtn:hover{background:var(--bg3)}
.sb-mark{width:24px;height:24px;border-radius:6px;background:var(--tx);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-scroll{flex:1;overflow-y:auto;padding:4px 8px 12px}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* Sidebar section label */
.sb-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--tx3);padding:10px 8px 3px;display:block}

/* Group header */
.grp-hdr{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:var(--r);font-size:13px;font-weight:400;color:var(--tx2);cursor:pointer;border:none;background:none;font-family:var(--f);width:100%;text-align:left;transition:all .1s;line-height:1.4}
.grp-hdr:hover{background:var(--bg3);color:var(--tx)}
.grp-hdr.on{background:var(--bg3);color:var(--tx);font-weight:500}
.grp-hdr svg.ico{flex-shrink:0;opacity:.45;transition:opacity .1s}
.grp-hdr:hover svg.ico,.grp-hdr.on svg.ico{opacity:1}
.grp-chev{margin-left:auto;opacity:.3;transition:transform .18s;flex-shrink:0}
.grp-chev.open{transform:rotate(90deg)}
.grp-body{overflow:hidden;max-height:0;transition:max-height .22s ease}
.grp-body.open{max-height:500px}

/* Sub-item - clean, no remove buttons */
.ni-sub{display:flex;align-items:center;padding:5px 8px 5px 30px;border-radius:var(--r);font-size:12.5px;font-weight:400;color:var(--tx3);cursor:pointer;border:none;background:none;font-family:var(--f);width:100%;text-align:left;transition:all .1s;line-height:1.4;position:relative}
.ni-sub:hover{background:var(--bg3);color:var(--tx)}
.ni-sub.on{color:var(--tx);font-weight:500}
.ni-sub.on::before{content:'';position:absolute;left:18px;top:50%;transform:translateY(-50%);width:4px;height:4px;border-radius:50%;background:var(--tx)}

/* Nav item */
.ni{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:var(--r);font-size:13px;font-weight:400;color:var(--tx2);cursor:pointer;border:none;background:none;font-family:var(--f);width:100%;text-align:left;transition:all .1s;line-height:1.4;user-select:none}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.on{background:var(--bg3);color:var(--tx);font-weight:500}
.ni svg.ico{flex-shrink:0;opacity:.45;transition:opacity .1s}
.ni:hover svg.ico,.ni.on svg.ico{opacity:1}

.dv{height:1px;background:var(--bd);margin:4px 0}
.cust-btn{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--tx3);cursor:pointer;border:1px dashed var(--bd);background:none;font-family:var(--f);width:100%;text-align:left;transition:all .1s;margin-top:2px}
.cust-btn:hover{border-color:var(--bl);color:var(--bl);background:var(--bll)}
.sb-foot{border-top:1px solid var(--bd);padding:8px;flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:var(--r);cursor:pointer;border:none;background:none;font-family:var(--f);width:100%;transition:background .1s}
.sb-user:hover{background:var(--bg3)}
.sb-av{width:24px;height:24px;border-radius:50%;background:var(--tx);color:var(--bg);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* LAYOUT */
.shell{display:flex;padding-top:var(--tb)}
.main{margin-left:var(--sb);flex:1;min-width:0;-webkit-overflow-scrolling:touch}
.page{display:none;padding:1.5rem 1.75rem 4rem;max-width:none;animation:fi .15s ease;contain:layout style}
.page-centered{max-width:700px;margin:0 auto}
.page.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.ph{margin-bottom:1.5rem}
.ph h2{font-size:17px;font-weight:600;letter-spacing:-.025em}
.ph p{font-size:12px;color:var(--tx3);margin-top:3px}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden}
.ch{padding:.875rem 1.125rem .7rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ct{font-size:12px;font-weight:500}.cm{font-size:11px;color:var(--tx3)}
.cb{padding:1.125rem}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g4 .span2{grid-column:span 2}
.kpi{padding:1rem 1.125rem}
.kl{font-size:11px;font-weight:500;color:var(--tx3)}
.kv{font-size:21px;font-weight:600;letter-spacing:-.04em;line-height:1.1;margin-top:.15rem}
.ks{display:flex;align-items:center;gap:5px;margin-top:.3rem;flex-wrap:wrap}
.dl{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:500;padding:1px 5px;border-radius:4px}
.dlu{color:var(--g);background:var(--gl)}.dld{color:var(--re);background:var(--rl)}.dln{color:var(--tx3);background:var(--bg3)}
.kn{font-size:11px;color:var(--tx3)}
.row{display:flex;align-items:center;gap:10px;padding:9px 1.125rem;border-bottom:1px solid var(--bd);transition:background .1s}
.row:last-child{border-bottom:none}.row:hover{background:var(--bg2)}
.row-main{flex:1;min-width:0}
.row-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11px;color:var(--tx3)}
.empty{padding:3rem 2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.75rem}
.ei{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.et{font-size:14px;font-weight:600}.ed{font-size:12px;color:var(--tx3);max-width:260px;line-height:1.7}
.ebtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

/* ── CUSTOMIZE PAGE ── */
.cust-layout{display:grid;grid-template-columns:280px 1fr;gap:1.5rem;align-items:start}
.cust-left{position:sticky;top:1.75rem}
.cust-left-card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}

/* Section selector in left column */
.sec-sel-item{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;cursor:pointer;border-bottom:1px solid var(--bg3);transition:background .1s;user-select:none;position:relative}
.sec-sel-item:last-child{border-bottom:none}
.sec-sel-item:hover{background:var(--bg2)}
.sec-sel-item.active{background:var(--bg2)}
.sec-sel-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--bl)}
.sec-sel-ico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-sel-name{font-size:12px;font-weight:500;flex:1}
.sec-sel-state{flex-shrink:0}

/* Toggle switch */
.tgl{position:relative;width:32px;height:18px;cursor:pointer;flex-shrink:0}
.tgl-track{position:absolute;inset:0;border-radius:20px;background:var(--bd2);transition:background .2s}
.tgl.on .tgl-track{background:var(--g)}
.tgl-thumb{position:absolute;top:3px;left:3px;width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.18);transition:transform .2s cubic-bezier(.4,0,.2,1)}
.tgl.on .tgl-thumb{transform:translateX(14px)}

/* Right panel - detail */
.cust-right-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
.cust-right-header h3{font-size:15px;font-weight:600;letter-spacing:-.02em}
.cust-right-header p{font-size:12px;color:var(--tx3);margin-top:3px;line-height:1.6;max-width:380px}
.cust-detail{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.cust-detail-info{padding:.875rem 1.125rem;border-bottom:1px solid var(--bd);background:var(--bg2);display:flex;align-items:center;gap:.875rem}
.cust-detail-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cust-detail-text h4{font-size:13px;font-weight:600}
.cust-detail-text p{font-size:11px;color:var(--tx3);margin-top:2px;line-height:1.5}

/* Sub-page rows */
.sub-row{display:flex;align-items:center;gap:12px;padding:.75rem 1.125rem;border-bottom:1px solid var(--bg3);transition:background .1s}
.sub-row:last-child{border-bottom:none}
.sub-row:hover{background:var(--bg2)}
.sub-row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sub-row-name{flex:1;font-size:13px;font-weight:500}
.sub-row-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0}
.badge-req{background:rgba(22,163,74,.08);color:#1e5e3c;border:1px solid var(--gb)}
.badge-on{background:var(--bll);color:var(--bl);border:1px solid var(--blb)}
.badge-off{background:var(--bg3);color:var(--tx3);border:1px solid var(--bd)}
.sub-row-desc{font-size:11px;color:var(--tx3);margin-top:1px}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:var(--sb);right:0;background:var(--bg);border-top:1px solid var(--bd);padding:.875rem 1.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;z-index:150;transform:translateY(100%);transition:transform .2s ease;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.save-bar.show{transform:translateY(0)}
.save-bar-msg{font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:7px}
.save-bar-dot{width:7px;height:7px;border-radius:50%;background:var(--am)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--tx);color:var(--bg);padding:.75rem 1rem;border-radius:8px;font-size:12px;font-weight:500;box-shadow:var(--sh2);z-index:999;display:none;align-items:center;gap:8px;animation:tup .2s ease;max-width:280px}
@keyframes tup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toast.on{display:flex}

/* ── RESPONSIVE BREAKPOINTS ─────────────────────────────────────────────── */

/* Tablet */
@media(max-width:960px){
  .cust-layout{grid-template-columns:1fr}
  .cust-left{position:static}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
  .page{padding:1.25rem 1.5rem 4rem;max-width:none}
  .ch{flex-wrap:wrap;gap:6px}
}

/* Large mobile / small tablet */
@media(max-width:860px){
  .setup-grid{grid-template-columns:1fr!important}
  .ni-modal-grid{grid-template-columns:1fr!important}
}
@media(max-width:700px){
  .g3{grid-template-columns:repeat(2,1fr)}
  .acct-row3{grid-template-columns:1fr 1fr}
  /* Tables · horizontal scroll */
  .card table{font-size:11px}
  /* Discounts table */
  .disc-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
}

/* Mobile */
@media(max-width:680px){
  /* Layout */
  .sidebar{display:none}
  .main{margin-left:0}
  .shell{padding-bottom:68px}

  /* Topbar */
  .topbar{padding:0 1rem;height:46px}
  .logo{font-size:13px}
  #page-title{display:none}
  /* Topbar: icon-only on secondary buttons */
  #topbar-actions .btn:not(.btn-p){font-size:0;padding:5px 8px;min-width:32px;justify-content:center}
  #topbar-actions .btn:not(.btn-p) svg{display:inline-block}

  /* Page */
  .page{padding:1rem 1rem 2rem;max-width:100%}
  .ph{margin-bottom:1.125rem}
  .ph h2{font-size:15px}
  .ph p{font-size:11px}

  /* Grids */
  .g2,.g3{grid-template-columns:1fr}
  .g4{grid-template-columns:1fr 1fr}
  .g4 .span2{grid-column:1/-1}
  .kv{font-size:18px}
  .kl{font-size:10px}

  /* Cards */
  .card{border-radius:8px}
  .cb{padding:.875rem}
  .ch{padding:.75rem 1rem;gap:6px}
  .ch .btn{padding:4px 8px;font-size:11px}

  /* Table scroll */
  .card table,.disc-table-wrap{overflow-x:auto;display:block;-webkit-overflow-scrolling:touch}
  table{min-width:max-content}

  /* Save bar */
  .save-bar{left:0;padding:.75rem 1rem}
  .save-bar-msg{font-size:11px}

  /* Customize */
  .cust-layout{grid-template-columns:1fr}
  .cust-left{position:static}

  /* Account form */
  .acct-row,.acct-row3{grid-template-columns:1fr}
  .acct-form-body{padding:1rem}
  .acct-form-footer{padding:.75rem 1rem;flex-wrap:wrap;gap:8px}
  .acct-progress{min-width:60px}
  .acct-hero-top{padding:1.25rem 1rem}
  .acct-tabs{padding:0}
  .acct-tab{padding:.75rem .875rem;font-size:10px}
  .acct-unlock-bar{grid-template-columns:1fr}
  .acct-unlock-item{border-right:none;border-bottom:1px solid var(--bd)}
  .acct-unlock-item:last-child{border-bottom:none}

  /* Bottom nav */
  .mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bd);z-index:150;height:calc(54px + env(safe-area-inset-bottom,0));padding-bottom:env(safe-area-inset-bottom,0)}
  .mob-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:600;color:var(--tx3);cursor:pointer;border:none;background:none;font-family:var(--f);text-transform:uppercase;letter-spacing:.05em;padding:0;transition:color .12s}
  .mob-nav-item.on{color:var(--tx)}
  .mob-nav-item svg{opacity:.4}
  .mob-nav-item.on svg{opacity:1}
}

/* ── ACCOUNT REVIEW ──────────────────────────────────────────────────────── */
.ni-account{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--or);cursor:pointer;border:1px solid var(--ob);background:var(--ol);font-family:var(--f);width:100%;text-align:left;transition:all .12s;line-height:1.4;user-select:none;margin-bottom:2px}
.ni-account:hover{background:#fdebd6;color:var(--or)}
.ni-account.verified{color:var(--g)}
.ni-account.verified .ni-account-dot{background:var(--g)}
.ni-account.review{color:var(--or)}
.ni-account.review .ni-account-dot{background:var(--or)}
.ni-account.declined{color:var(--re)}
.ni-account.declined .ni-account-dot{background:var(--re)}
.ni-account-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--or)}
.ni-account-dot.pulse{animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.ni-account-dot.green{background:var(--g)}
.ni-account-dot.blue{background:var(--bl)}
.ni-account-dot.orange{background:var(--or)}
.ni-account-dot.red{background:var(--re)}

/* Account page layout */
.acct-page{max-width:760px}

/* Hero + unlock */
.acct-hero{background:var(--bg);border:1px solid var(--bd);border-radius:14px;overflow:visible;margin-bottom:1.25rem;max-width:700px;margin-left:auto;margin-right:auto}
.acct-hero-top{padding:1.75rem 1.75rem 1.5rem}
.acct-hero-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:.5rem}
.acct-hero-title{font-size:22px;font-weight:700;letter-spacing:-.04em;line-height:1.2;margin-bottom:.5rem}
.acct-hero-sub{font-size:12px;color:var(--tx3);line-height:1.7;max-width:480px}
.acct-unlock-bar{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--bd)}
.acct-unlock-item{padding:.875rem 1rem;border-right:1px solid var(--bd);display:flex;align-items:flex-start;gap:9px}
.acct-unlock-item:last-child{border-right:none}
.acct-unlock-ico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.acct-unlock-title{font-size:11px;font-weight:600;margin-bottom:2px}
.acct-unlock-sub{font-size:10px;color:var(--tx3);line-height:1.5}

/* Crypto available note */
.acct-crypto-note{display:flex;align-items:flex-start;gap:10px;padding:.875rem 1.125rem;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;margin-bottom:1.25rem;font-size:12px;color:var(--tx2);line-height:1.6}

/* Wizard form card */
.acct-wizard{background:var(--bg);border:1px solid var(--bd);border-radius:14px;overflow:visible;margin-bottom:1.25rem;max-width:700px;margin-left:auto;margin-right:auto}

/* Tab stepper */
.acct-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--bd);background:var(--bg2);scrollbar-width:none}
.acct-tabs::-webkit-scrollbar{display:none}
.acct-tab{display:flex;align-items:center;gap:7px;padding:.875rem 1.125rem;font-size:11px;font-weight:500;color:var(--tx3);cursor:pointer;border:none;background:none;font-family:var(--f);white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;flex-shrink:0}
.acct-tab:hover{color:var(--tx);background:var(--bg)}
.acct-tab.active{color:var(--tx);font-weight:600;border-bottom-color:var(--tx);background:var(--bg)}
.acct-tab.done{color:var(--g)}
.acct-tab-num{width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg3);color:var(--tx3);transition:all .2s}
.acct-tab.active .acct-tab-num{background:var(--tx);color:var(--bg)}
.acct-tab.done .acct-tab-num{background:var(--g);color:#fff}

/* Form body */
.acct-form-body{padding:1.5rem 1.75rem}
.acct-field{margin-bottom:1.125rem}
.acct-field label{display:block;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.acct-input{font-family:var(--f);font-size:16px;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);width:100%;background:var(--bg);color:var(--tx);outline:none;transition:border-color .12s;line-height:1.5}
.acct-input:focus{border-color:var(--tx);box-shadow:0 0 0 3px rgba(9,9,11,.05)}
.acct-input::placeholder{color:var(--tx3)}
.acct-select{font-family:var(--f);font-size:16px;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);width:100%;background:var(--bg);color:var(--tx);outline:none;-webkit-appearance:none;cursor:pointer;transition:border-color .12s}
.acct-select:focus{border-color:var(--tx);box-shadow:0 0 0 3px rgba(9,9,11,.05)}
.acct-textarea{font-family:var(--f);font-size:16px;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);width:100%;background:var(--bg);color:var(--tx);outline:none;resize:none;transition:border-color .12s;line-height:1.6}
.acct-textarea:focus{border-color:var(--tx);box-shadow:0 0 0 3px rgba(9,9,11,.05)}
.acct-textarea::placeholder{color:var(--tx3)}
.acct-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.acct-row3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

/* Radio choice tiles */
.acct-radio-tile{display:flex;align-items:center;gap:8px;padding:.625rem .875rem;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;transition:all .12s;user-select:none;background:var(--bg)}
.acct-radio-tile:hover{border-color:var(--bd2);background:var(--bg2)}
.acct-radio-tile.on{border-color:var(--tx);background:var(--bg)}
.acct-radio-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.acct-radio-tile.on .acct-radio-dot{border-color:var(--tx);background:var(--tx)}

/* Upload zone */
.acct-upload{border:1.5px dashed var(--bd);border-radius:var(--r);padding:1.5rem;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg2)}
.acct-upload:hover{border-color:var(--bd2);background:var(--bg3)}

/* Form footer */
.acct-form-footer{padding:1rem 1.75rem;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
.acct-progress{flex:1;height:2px;background:var(--bd);border-radius:20px;overflow:hidden;margin:0 1.25rem}
.acct-progress-fill{height:100%;background:var(--tx);border-radius:20px;transition:width .3s ease}

/* Status cards */
.acct-status{border-radius:14px;overflow:visible;margin-bottom:1.25rem;border:1px solid var(--bd);max-width:700px;margin-left:auto;margin-right:auto}
.acct-status-header{padding:1.25rem 1.5rem;display:flex;align-items:center;gap:12px}
.acct-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.acct-status-title{font-size:15px;font-weight:700;letter-spacing:-.02em}
.acct-status-sub{font-size:12px;color:var(--tx2);margin-top:3px;line-height:1.6}
.acct-status-body{padding:1.25rem 1.5rem;border-top:1px solid rgba(0,0,0,.06);background:var(--bg)}
.acct-cap{display:flex;align-items:center;gap:9px;padding:.5rem 0;font-size:12px;border-bottom:1px solid var(--bg3)}
.acct-cap:last-child{border-bottom:none}
.acct-cap-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Responsive */
@media(max-width:680px){
  .acct-unlock-bar{grid-template-columns:1fr}
  .acct-unlock-item{border-right:none;border-bottom:1px solid var(--bd)}
  .acct-unlock-item:last-child{border-bottom:none}
  .acct-row,.acct-row3{grid-template-columns:1fr}
  .acct-form-body{padding:1.125rem}
  .acct-form-footer{padding:.875rem 1.125rem}
  .acct-hero-top{padding:1.25rem}
  .acct-tabs{padding:0}
  .acct-tab{padding:.75rem .875rem;font-size:10px}
}

/* ── NOTIFICATIONS ───────────────────────────────────────────────────────── */
.notif-page{max-width:700px;margin:0 auto}
.notif-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.notif-header h2{font-size:17px;font-weight:700;letter-spacing:-.03em}
.notif-header p{font-size:12px;color:var(--tx3);margin-top:3px}

/* Channel card */
.notif-channel{background:var(--bg);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:12px;transition:box-shadow .15s}
.notif-channel:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.notif-channel-header{display:flex;align-items:center;gap:12px;padding:1rem 1.25rem;cursor:pointer;user-select:none}
.notif-channel-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-channel-name{font-size:13px;font-weight:600;flex:1}
.notif-channel-status{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.notif-channel-status.active{background:var(--gl);color:#1e5e3c}
.notif-channel-status.inactive{background:var(--bg3);color:var(--tx3)}
.notif-channel-body{border-top:1px solid var(--bd);padding:1.125rem 1.25rem;background:var(--bg2)}
.notif-channel-actions{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bd);padding:.75rem 1.25rem;background:var(--bg)}

/* Config fields */
.notif-field{margin-bottom:1rem}
.notif-field label{display:block;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.notif-field input{font-family:var(--f);font-size:13px;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);width:100%;background:var(--bg);color:var(--tx);outline:none;transition:border-color .12s}
.notif-field input:focus{border-color:var(--tx);box-shadow:0 0 0 3px rgba(9,9,11,.05)}
.notif-field input::placeholder{color:var(--tx3)}

/* Notification levels */
.notif-levels{display:flex;flex-direction:column;gap:6px;margin-top:.25rem}
.notif-level{display:flex;align-items:center;gap:10px;padding:.625rem .875rem;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .12s;user-select:none}
.notif-level:hover{border-color:var(--bd2);background:var(--bg)}
.notif-level.on{border-color:var(--tx);background:var(--bg)}
.notif-level-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.notif-level.on .notif-level-check{border-color:var(--tx);background:var(--tx)}
.notif-level-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.notif-level-name{font-size:12px;font-weight:600;flex:1}
.notif-level-desc{font-size:11px;color:var(--tx3)}

/* Add channel button */
.notif-add{display:flex;align-items:center;gap:8px;padding:.875rem 1.125rem;border:1.5px dashed var(--bd);border-radius:12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx3);background:none;font-family:var(--f);width:100%;transition:all .15s;margin-top:4px}
.notif-add:hover{border-color:var(--tx);color:var(--tx);background:var(--bg3)}

/* Add channel picker */
.notif-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.notif-pick-tile{border:1.5px solid var(--bd);border-radius:10px;padding:1rem;cursor:pointer;text-align:center;transition:all .15s;background:var(--bg)}
.notif-pick-tile:hover{border-color:var(--bd2);background:var(--bg2)}
.notif-pick-tile.used{opacity:.4;pointer-events:none}

@media(max-width:680px){
  .notif-picker{grid-template-columns:1fr}
}

/* ── Checklist (home page) ────────────────────────────────────────────── */
.ob-checklist-item{display:flex;align-items:flex-start;gap:12px;padding:.875rem 1.125rem;border-bottom:1px solid var(--bg3);transition:background .1s}

// Combine multiple presets into one sidebar map
function buildCombinedPreset(useCases) {
  var combined = {};
  useCases.forEach(function(uc) {
    var preset = SIDEBAR_PRESETS[uc];
    if (!preset) return;
    Object.keys(preset).forEach(function(secId) {
      if (!combined[secId]) combined[secId] = [];
      preset[secId].forEach(function(item) {
        if (combined[secId].indexOf(item) === -1) combined[secId].push(item);
      });
    });
  });
  return combined;
}

function applyPreset(useCases) {
  if (!Array.isArray(useCases)) useCases = [useCases];
  var preset = buildCombinedPreset(useCases);
  if (!Object.keys(preset).length) return;
  var newMap = new Map();
  SCHEMA.forEach(function(sec) {
    if (!(sec.id in preset)) return;
    var items = new Set();
    sec.items.forEach(function(it) { if (it.req) items.add(it.id); });
    var presetItems = preset[sec.id] || [];
    presetItems.forEach(function(id) { items.add(id); });
    if (items.size > 0) newMap.set(sec.id, items);
  });
  saved = newMap;
  draft = cloneMap(saved);
  renderSidebar();
}

function buildNotifPage() {
  var pg = document.getElementById('p-notifications-channels');
  if (!pg) {
    pg = document.createElement('div');
    pg.className = 'page';
    pg.id = 'p-notifications-channels';
    document.querySelector('.main').appendChild(pg);
  }
  pg.innerHTML = renderNotifPage();
  pg.dataset.built = '1';
}

function renderNotifPage() {
  var usedTypes = NOTIF_STATE.channels.map(function(c){ return c.type; });

  var channelCards = NOTIF_STATE.channels.map(function(ch, idx) {
    return renderChannelCard(ch, idx);
  }).join('');

  // Add channel button - only show types not yet added
  var availableTypes = Object.keys(NOTIF_CHANNEL_TYPES).filter(function(t){
    return !usedTypes.includes(t);
  });

  var pickerHtml = '';
  if (NOTIF_STATE.showPicker) {
    pickerHtml = '<div class="notif-picker">' +
      availableTypes.map(function(t){

      '<div>' +
        '<h2>Notifications</h2>' +

      (availableTypes.length > 0 ? '<button class="btn btn-p" onclick="notifTogglePicker()">+ Add channel</button>' : '') +

function renderChannelCard(ch, idx) {

  var configHtml = def.fields.map(function(f){
    var val = ch.config[f.key] || '';
    return '<div class="notif-field">' +
      '<label>'+f.label+'</label>' +
      '<input type="'+f.type+'" placeholder="'+f.placeholder+'" value="'+val+'" ' +
        'data-ch="'+idx+'" data-key="'+f.key+'" oninput="notifUpdateConfig(this)">' +
    '</div>';
  }).join('');

  // Active levels
  var levelsHtml = NOTIF_LEVELS.map(function(lv){
    var on = ch.levels.indexOf(lv.id) !== -1;

      '<div style="flex:1">' +
        '<div class="notif-level-name">'+lv.name+'</div>' +
        '<div class="notif-level-desc">'+lv.desc+'</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var isOpen = ch.open;
  var activeLevelCount = ch.levels.length;

  return '<div class="notif-channel" id="notif-ch-'+idx+'">' +
    // Header
    '<div class="notif-channel-header" onclick="notifToggleOpen('+idx+')">' +
      '<div class="notif-channel-ico" style="background:'+def.bg+'">'+def.ico+'</div>' +
      '<div style="flex:1">' +
        '<div class="notif-channel-name">'+def.label+

function notifTogglePicker() {
  NOTIF_STATE.showPicker = !NOTIF_STATE.showPicker;
  buildNotifPage();
}

function notifAddChannel(type) {
  NOTIF_STATE.channels.push({
    id: type + '-' + Date.now(),
    type: type,
    config: {},
    levels: ['payment_received', 'dispute_opened', 'payout_sent'],
    active: true,
    open: true,
  });
  NOTIF_STATE.showPicker = false;
  buildNotifPage();
  document.getElementById('p-notifications-channels').dataset.built = '';
}

function notifRemoveChannel(idx) {
  NOTIF_STATE.channels.splice(idx, 1);
  buildNotifPage();
  document.getElementById('p-notifications-channels').dataset.built = '';
}

function notifToggleOpen(idx) {
  NOTIF_STATE.channels[idx].open = !NOTIF_STATE.channels[idx].open;
  buildNotifPage();
  document.getElementById('p-notifications-channels').dataset.built = '';
}

function notifToggleActive(idx) {
  NOTIF_STATE.channels[idx].active = !NOTIF_STATE.channels[idx].active;
  buildNotifPage();
  document.getElementById('p-notifications-channels').dataset.built = '';
}

function notifUpdateConfig(input) {
  var idx = parseInt(input.getAttribute('data-ch'));
  var key = input.getAttribute('data-key');
  NOTIF_STATE.channels[idx].config[key] = input.value;
  // Update the subtitle in the header live
  var ch = NOTIF_STATE.channels[idx];
  var def = NOTIF_CHANNEL_TYPES[ch.type];
  var headerName = document.querySelector('#notif-ch-'+idx+' .notif-channel-name');
  if (headerName && def) {
    var firstVal = ch.config[def.fields[0].key] || '';
    headerName.innerHTML = def.label + (firstVal ? '<span style="font-size:11px;font-weight:400;color:var(--tx3);margin-left:8px">'+firstVal+'</span>' : '');
  }
}

function notifToggleLevel(el) {
  var idx = parseInt(el.getAttribute('data-ch'));
  var lv  = el.getAttribute('data-lv');
  var ch  = NOTIF_STATE.channels[idx];
  var pos = ch.levels.indexOf(lv);
  if (pos === -1) ch.levels.push(lv); else ch.levels.splice(pos, 1);
  // Re-render just this card
  var card = document.getElementById('notif-ch-'+idx);
  if (card) {
    var tmp = document.createElement('div');
    tmp.innerHTML = renderChannelCard(ch, idx);
    card.replaceWith(tmp.firstChild);
    // Update count
  }
  // Update count in page header (rebuild minimally)
  buildNotifPage();
  document.getElementById('p-notifications-channels').dataset.built = '';
}

function notifSaveChannel(idx) {
  showToast('add', 'Channel saved.');
}

    pg.id = 'p-account';
    document.querySelector('.main').appendChild(pg);

  var inner = ACCT.status === 'none'

function updateAcctBadge() {
  var btn = document.getElementById('ni-account');
  var dot = document.getElementById('ni-account-dot');
  if (!btn || !dot) return;
  btn.className = 'ni-account';
  dot.className = 'ni-account-dot';
  var span = btn.querySelector('span');
  if (ACCT.status === 'approved') {
    btn.classList.add('verified'); dot.classList.add('green');
    if (span) span.textContent = 'Verified';
  } else if (ACCT.status === 'under_review') {
    btn.classList.add('review'); dot.classList.add('orange');
    if (span) span.textContent = 'Under review';
  } else if (ACCT.status === 'more_info') {
    btn.classList.add('review'); dot.classList.add('pulse');
    if (span) span.textContent = 'Action needed';
  } else if (ACCT.status === 'declined') {
    btn.classList.add('declined'); dot.classList.add('red');
    if (span) span.textContent = 'Not eligible';
  } else {
    dot.classList.add('pulse');
    if (span) span.textContent = 'Account verification';
  }
}

function acctReferralToggle() {
  var dd   = document.getElementById('acct-referral-dropdown');
  var chev = document.getElementById('acct-referral-chev');
  if (!dd) return;
  var isOpen = dd.style.display !== 'none';
  dd.style.display = isOpen ? 'none' : 'block';
  if (chev) chev.style.transform = isOpen ? '' : 'rotate(180deg)';
  if (!isOpen) {
    setTimeout(function() {
      var close = function(e) {
        var wrap = document.getElementById('acct-referral-wrap');
        if (wrap && !wrap.contains(e.target)) { acctReferralClose(); }
        document.removeEventListener('click', close);
      };
      document.addEventListener('click', close);
    }, 10);
  }
}

function acctReferralClose() {
  var dd   = document.getElementById('acct-referral-dropdown');
  var chev = document.getElementById('acct-referral-chev');
  if (dd) dd.style.display = 'none';
  if (chev) chev.style.transform = '';
}

function acctReferralPick(val) {
  if (ACCT) ACCT.referral = val;
  acctReferralClose();
  // Re-render just the dropdown trigger area
  var wrap = document.getElementById('acct-referral-wrap');
  if (wrap) wrap.outerHTML = buildReferralDropdown();
}

function acctSel(key, opts) {
  return '<select class="acct-select" data-k="'+key+'" onchange="acctSelChange(this)">' +
    '<option value="">Select...</option>' +
    opts.map(function(o) { return '<option>'+o+'</option>'; }).join('') +
  '</select>';
}

  return {
    cards: s.cards, bank: s.bank, crypto: s.crypto,

    cryptoTokens: new Set(s.cryptoTokens),
    swapEnabled: s.swapEnabled, swapMode: s.swapMode,

  };

function getPmStateForProduct(productId) {
  var ov = productPMOverrides.get(productId);
  if (!ov || ov.scope === 'account') return pmState;
  return ov.state;
}

function setPMScopeForProduct(productId, scope) {
  var ov = productPMOverrides.get(productId) || {scope:'account', state: clonePmState(pmState)};
  ov.scope = scope;
  if (scope === 'product' && !productPMOverrides.has(productId)) {
    ov.state = clonePmState(pmState);
  }
  productPMOverrides.set(productId, ov);
}

function toggleNetworkForProduct(productId, netId) {
  var ov = productPMOverrides.get(productId);
  if (!ov) return;
  if (ov.state.cryptoNetworks.has(netId)) ov.state.cryptoNetworks.delete(netId);
  else ov.state.cryptoNetworks.add(netId);
  // Remove tokens that are no longer available on any active network
  ov.state.cryptoTokens.forEach(function(tid) {
    var tok = CRYPTO_TOKENS.find(function(t){ return t.id === tid; });
    if (tok && !tok.networks.some(function(n){ return ov.state.cryptoNetworks.has(n); })) {
      ov.state.cryptoTokens.delete(tid);
    }
  });
  renderNewProductPMs(productId);
}

function toggleTokenForProduct(productId, tokId) {
  var ov = productPMOverrides.get(productId);
  if (!ov) return;
  if (ov.state.cryptoTokens.has(tokId)) ov.state.cryptoTokens.delete(tokId);
  else ov.state.cryptoTokens.add(tokId);
  renderNewProductPMs(productId);
}

  // Clean orphaned tokens
  pmState.cryptoTokens.forEach(function(tid) {

function getSection(id) { return SCHEMA.find(function(s){return s.id===id;}); }
function cloneMap(m) {
  var out = new Map();
  m.forEach(function(v,k){ out.set(k, new Set(v)); });
  return out;
}
function mapsEqual(a,b) {
  if (a.size !== b.size) return false;
  var eq = true;
  a.forEach(function(v,k){
    if (!b.has(k)) { eq=false; return; }
    var bv = b.get(k);
    if (v.size !== bv.size) { eq=false; return; }
    v.forEach(function(x){ if (!bv.has(x)) eq=false; });
  });
  return eq;
}

function markDirty() {
  isDirty = !mapsEqual(draft, saved);
  document.getElementById('save-bar').classList.toggle('show', isDirty);
}

// ─── DRAFT OPERATIONS ─────────────────────────────────────────────────────────
function draftToggleSection(sid) {
  if (draft.has(sid)) {
    draft.delete(sid);
  } else {
    var sec = getSection(sid);
    if (!sec) return;
    var items = new Set();
    sec.items.forEach(function(it){ if(it.req) items.add(it.id); });
    draft.set(sid, items);
    if (openGroups[sid] === undefined) openGroups[sid] = true;
  }
  markDirty();
  renderCustLeft();
  if (custActiveSec === sid && !draft.has(sid)) {
    custActiveSec = null;
    renderCustRight();
  } else if (custActiveSec === sid) {
    renderCustRight();
  }
}

function draftToggleItem(sid, itemId) {
  if (!draft.has(sid)) return;
  var itemSet = draft.get(sid);
  if (itemSet.has(itemId)) {
    itemSet.delete(itemId);
  } else {
    itemSet.add(itemId);
  }
  markDirty();
  renderCustRight();
}

function saveChanges() {
  saved = cloneMap(draft);
  isDirty = false;
  document.getElementById('save-bar').classList.remove('show');

function discardChanges() {
  draft = cloneMap(saved);
  isDirty = false;
  document.getElementById('save-bar').classList.remove('show');
  renderCustLeft();

}

          '<div style="width:40px;height:40px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.08)">'+s.ico+'</div>' +

        '</div>' +
        '<div style="font-size:15px;font-weight:800;letter-spacing:-.03em;color:var(--tx);margin-bottom:2px">'+s.label+'</div>' +
        '<div style="font-size:12px;font-weight:600;color:'+s.color+'">'+s.tagline+'</div>' +
        '<div style="font-size:11.5px;color:var(--tx3);margin-top:3px">'+s.sub+'</div>' +
      '</div>' +
      '<div style="padding:.875rem 1.125rem;flex:1">' +

        '<div style="margin-top:8px;font-size:11px;color:var(--tx3);font-style:italic">'+s.sections+'</div>' +

    '<div style="margin-bottom:2rem">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
        '<div style="font-size:12.5px;font-weight:700;color:var(--tx2)">Recommended setups</div>' +
        '<div style="font-size:11.5px;color:var(--tx3)">One click to configure your whole sidebar</div>' +
      '</div>' +
      '<div class="setup-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch">' +

      '</div>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem">' +
      '<div style="flex:1;height:1px;background:var(--bd)"></div>' +
      '<span style="font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap">Fine-tune manually</span>' +
      '<div style="flex:1;height:1px;background:var(--bd)"></div>' +
    '</div>' +
    '<div class="cust-layout">' +
      '<div class="cust-left"><div class="cust-left-card" id="cust-sec-list"></div></div>' +
      '<div><div id="cust-right-area"></div></div>' +
    '</div>';

  renderCustLeft();
  if (!custActiveSec && draft.size > 0) {
    custActiveSec = draft.keys().next().value;
  } else if (draft.size === 0) {
    custActiveSec = SCHEMA[0] ? SCHEMA[0].id : null;
  }
  renderCustRight();
}

function renderCustLeft() {
  var list = document.getElementById('cust-sec-list');
  if (!list) return;
  list.innerHTML = SCHEMA.map(function(sec) {
    var on = draft.has(sec.id);
    var active = custActiveSec === sec.id ? ' active' : '';
    return '<div class="sec-sel-item' + active + '" onclick="selectCustSec(\'' + sec.id + '\')">' +
      '<div class="sec-sel-ico" style="background:' + sec.icoBg + '">' + sec.ico + '</div>' +
      '<span class="sec-sel-name">' + sec.label + '</span>' +
      '<div class="tgl ' + (on?'on':'') + '" onclick="event.stopPropagation();draftToggleSection(\'' + sec.id + '\')">' +
        '<div class="tgl-track"></div><div class="tgl-thumb"></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function selectCustSec(sid) {
  custActiveSec = sid;
  renderCustLeft();
  renderCustRight();
}

function renderCustRight() {
  var area = document.getElementById('cust-right-area');
  if (!area) return;
  if (!custActiveSec) {
    area.innerHTML = '<div style="padding:3rem 1rem;text-align:center;color:var(--tx3);font-size:12px">Select a section on the left to configure it.</div>';
    return;
  }
  var sec = getSection(custActiveSec);
  if (!sec) return;
  var on = draft.has(sec.id);
  var itemSet = on ? draft.get(sec.id) : new Set();

  // Header
  var hdr = '<div class="cust-right-header">' +
    '<div>' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
        '<div style="width:28px;height:28px;border-radius:7px;background:' + sec.icoBg + ';display:flex;align-items:center;justify-content:center">' + sec.ico + '</div>' +
        '<h3 style="font-size:15px;font-weight:600;letter-spacing:-.02em">' + sec.label + '</h3>' +
        '<div class="tgl ' + (on?'on':'') + '" onclick="draftToggleSection(\'' + sec.id + '\')" style="margin-left:4px">' +
          '<div class="tgl-track"></div><div class="tgl-thumb"></div>' +
        '</div>' +
      '</div>' +
      '<p style="font-size:12px;color:var(--tx3);line-height:1.6;max-width:400px">' + sec.desc + '</p>' +
    '</div>' +
  '</div>';

  if (!on) {
    area.innerHTML = hdr +
      '<div style="background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:2rem 1.5rem;text-align:center">' +
        '<div style="font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:6px">Section not active</div>' +
        '<div style="font-size:12px;color:var(--tx3);margin-bottom:1rem">Enable this section to configure its sub-pages.</div>' +
        '<button class="btn btn-p btn-sm" onclick="draftToggleSection(\'' + sec.id + '\')">Enable ' + sec.label + '</button>' +
      '</div>';
    return;
  }

  // Sub-pages
  var reqItems = sec.items.filter(function(it){ return it.req; });
  var optItems = sec.items.filter(function(it){ return !it.req; });

  var subRows = '';

  // Required header
  if (reqItems.length) {
    subRows += '<div style="padding:.625rem 1.125rem;background:var(--bg2);border-bottom:1px solid var(--bd)">' +
      '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3)">Always visible</span>' +
      '<span style="font-size:11px;color:var(--tx3);margin-left:8px">Cannot be removed from this section</span>' +
    '</div>';
    reqItems.forEach(function(it) {
      subRows += '<div class="sub-row">' +
        '<div class="sub-row-dot" style="background:var(--g)"></div>' +
        '<div style="flex:1"><div class="sub-row-name">' + it.label + '</div>' +
          '<div class="sub-row-desc">' + it.desc + '</div>' +
        '</div>' +
        '<span class="sub-row-badge badge-req">Always on</span>' +
      '</div>';
    });
  }

  // Optional header
  if (optItems.length) {
    subRows += '<div style="padding:.625rem 1.125rem;background:var(--bg2);border-bottom:1px solid var(--bd);border-top:1px solid var(--bd);margin-top:2px">' +
      '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3)">Optional</span>' +
      '<span style="font-size:11px;color:var(--tx3);margin-left:8px">Toggle on the sub-pages you want</span>' +
    '</div>';
    optItems.forEach(function(it) {
      var itOn = itemSet.has(it.id);
      subRows += '<div class="sub-row">' +
        '<div class="sub-row-dot" style="background:' + (itOn ? 'var(--bl)' : 'var(--bd2)') + '"></div>' +
        '<div style="flex:1"><div class="sub-row-name">' + it.label + '</div>' +
          '<div class="sub-row-desc">' + it.desc + '</div>' +
        '</div>' +
        '<div class="tgl ' + (itOn?'on':'') + '" onclick="draftToggleItem(\'' + sec.id + '\',\'' + it.id + '\')">' +
          '<div class="tgl-track"></div><div class="tgl-thumb"></div>' +
        '</div>' +
      '</div>';
    });
  }

  area.innerHTML = hdr +
    '<div class="cust-detail">' +
      subRows +
    '</div>';
}

function mkKpi(label, val, cls, sub, sub2) {
  return '<div class="card kpi"><div class="kl">'+label+'</div><div class="kv">'+val+'</div><div class="ks"><span class="dl '+cls+'">'+sub+'</span>'+(sub2?'<span class="kn">'+sub2+'</span>':'')+'</div></div>';
}
function miniBarChart(vals) {
  var max = Math.max.apply(null, vals);
  var bars = vals.map(function(v,i){
    var h = Math.round(60 * v / max);
    var last = i===vals.length-1;
    var bg = last ? 'var(--tx)' : 'var(--bl)';
    var op = last ? '1' : '0.4';
    return '<div style="flex:1;display:flex;align-items:flex-end;height:60px"><div style="width:100%;border-radius:2px 2px 0 0;background:'+bg+';opacity:'+op+';height:'+h+'px"></div></div>';
  }).join('');
  return '<div class="cb" style="padding:.75rem 1.125rem .5rem"><div style="display:flex;align-items:flex-end;gap:2px;height:60px">'+bars+'</div></div>';
}

  // ── Product details header cards ──────────────────────────────────────────
  var infocardStyle = 'border:1px solid var(--bd);border-radius:var(--r2);padding:.875rem 1.125rem;background:var(--bg);flex:1;min-width:100px';

    '</div>';

  // ── Common tab builder ─────────────────────────────────────────────────────
  function buildTabs(tabs, activeTab, onclickFn) {
    return '<div style="display:flex;gap:0;border-bottom:1px solid var(--bd);padding:0 1.125rem">'+
      tabs.map(function(t) {
        var on = t.label === activeTab;
        return '<button onclick="'+onclickFn+'(\''+t.label+'\')" style="padding:10px 0;margin-right:16px;font-size:13px;font-weight:'+(on?'600':'400')+';font-family:var(--f);border:none;background:transparent;color:'+(on?'var(--tx)':'var(--tx3)')+';cursor:pointer;border-bottom:2px solid '+(on?'var(--tx)':'transparent')+';white-space:nowrap;transition:all .12s">'+t.label+' <span style="font-size:11px;color:'+(on?'var(--tx2)':'var(--tx3)')+'">('+(t.count)+')</span></button>';
      }).join('')+
    '</div>';
  }

  // ── TRANSACTIONS section ───────────────────────────────────────────────────
  function buildTxSection() {
    var q = PROD_DETAIL_TX_SEARCH.toLowerCase().trim();
    // Search across all data first (before tab filter, for counts)
    var searched = q ? DETAIL_TX_DATA.filter(function(r){
      return (r.customer||'').toLowerCase().indexOf(q)!==-1 ||
             (r.tid||'').toLowerCase().indexOf(q)!==-1 ||
             (r.date||'').toLowerCase().indexOf(q)!==-1 ||
             (r.status||'').toLowerCase().indexOf(q)!==-1 ||
             (r.method||'').toLowerCase().indexOf(q)!==-1;
    }) : DETAIL_TX_DATA;
    var txCounts = {
      All:      searched.length,
      Success:  searched.filter(function(r){return r.status==='Success';}).length,
      Pending:  searched.filter(function(r){return r.status==='Initiated';}).length,
      Expired:  searched.filter(function(r){return r.status==='Expired';}).length,
    };
    var tabs = [
      {label:'All',     count:txCounts.All},
      {label:'Success', count:txCounts.Success},
      {label:'Pending', count:txCounts.Pending},
      {label:'Expired', count:txCounts.Expired},
    ];
    var filtered = searched.filter(function(r) {
      if (PROD_DETAIL_TX_TAB === 'All')     return true;
      if (PROD_DETAIL_TX_TAB === 'Success') return r.status === 'Success';
      if (PROD_DETAIL_TX_TAB === 'Pending') return r.status === 'Initiated';
      if (PROD_DETAIL_TX_TAB === 'Expired') return r.status === 'Expired';
      return true;
    });
    var start  = (PROD_DETAIL_TX_PAGE - 1) * PROD_DETAIL_TX_ROWS;
    var paged  = filtered.slice(start, start + PROD_DETAIL_TX_ROWS);
    var thStyle = 'font-size:11px;font-weight:500;color:var(--tx3);padding:8px 14px;text-align:left;border-bottom:1px solid var(--bd);background:var(--bg2);white-space:nowrap';
    var thead = '<thead><tr>'+['Status','Customer','Type','Method','Transaction ID','Date'].map(function(h){ return '<th style="'+thStyle+'">'+h+'</th>'; }).join('')+'</tr></thead>';

function buildCryptoDetail(state, networkFn, tokenFn) {
  var networkHtml = '<div style="margin-bottom:.875rem">' +
    '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:8px">Networks</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px">';
  CRYPTO_NETWORKS.forEach(function(n) {
    var on = state.cryptoNetworks.has(n.id);
    networkHtml += '<div onclick="' + networkFn + '(\'' + n.id + '\')" style="display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;border:1px solid '+(on?n.color:'var(--bd)')+';background:'+(on?n.color+'18':'var(--bg)')+';cursor:pointer;transition:all .12s">' +
      '<span style="width:7px;height:7px;border-radius:50%;background:'+n.color+';flex-shrink:0"></span>' +

    '</div>';
  });
  networkHtml += '</div></div>';

  var tokenHtml = '<div>' +
    '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:8px">Tokens</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px">';

    var available = tok.networks.some(function(n){ return state.cryptoNetworks.has(n); });

    '<div style="font-size:10px;color:var(--tx3);margin-top:8px;line-height:1.5">Tokens greyed out are not available on the selected networks.</div>' +

  return networkHtml + tokenHtml;
}

      cryptoReceivingRow('btc',    btcSvg,    '#fff8ee', 'Bitcoin',      'BTC mainnet',                        ['BTC'],                     wallets.btc) +
    '</div>';

  return intro + sep1 + section1 + sep2 + section2;
}

function hideCryptoWalletModal() {
  var m = document.getElementById('crypto-wallet-modal');
  if (m) m.style.display = 'none';
}

function validateCryptoInput(inp, networkId) {
  var val = inp.value.trim();
  var validators = {
    solana: function(v){ return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(v); },
    evm:    function(v){ return /^0x[0-9a-fA-F]{40}$/.test(v); },
    btc:    function(v){ return /^(1|3|bc1)[a-zA-HJ-NP-Z0-9]{25,62}$/.test(v); },
  };
  var valid = val.length > 0 && (validators[networkId] || validators.evm)(val);
  var vEl = document.getElementById('cw-validation');
  var btn = document.getElementById('cw-save-btn');
  if (vEl) {
    if (!val) { vEl.innerHTML = ''; }
    else if (valid) {
      vEl.innerHTML = '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" fill="#287a50" opacity=".15"/><path d="M3.5 6.5l2 2 4-4" stroke="#287a50" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="color:#287a50;font-size:11.5px;font-weight:500">Valid address format</span>';
    } else {
      vEl.innerHTML = '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" fill="#b03030" opacity=".12"/><path d="M4.5 4.5l4 4M8.5 4.5l-4 4" stroke="#b03030" stroke-width="1.3" stroke-linecap="round"/></svg><span style="color:#b03030;font-size:11.5px;font-weight:500">Invalid format</span>';
    }
  }
  if (btn) {
    var allChecked = [0,1,2].every(function(i){ var c=document.getElementById('cw-chk-'+i); return c&&c.checked; });
    var canSave = valid && allChecked;
    btn.disabled = !canSave;
    btn.style.opacity = canSave ? '1' : '.4';
    btn.style.cursor  = canSave ? 'pointer' : 'default';
  }
  // Also check when boxes change
  [0,1,2].forEach(function(i){
    var c = document.getElementById('cw-chk-'+i);
    if (c && !c._bound) { c._bound=true; c.onchange=function(){ validateCryptoInput(document.getElementById('cw-input'),networkId); }; }
  });
}

function saveCryptoWallet(networkId) {
  var inp = document.getElementById('cw-input');
  if (!inp) return;
  var addr = inp.value.trim();
  if (networkId === 'solana') { CRYPTO_WALLETS.solana = { saved:true, address:addr, label:'Solana Wallet' }; }
  else if (networkId === 'evm') { CRYPTO_WALLETS.evm = { saved:true, address:addr, label:'EVM Wallet' }; }
  hideCryptoWalletModal();
  showToast('add', 'Address saved');
  // Rebuild destinations page
  var pg = document.getElementById('p-payouts-destinations');
  if (pg) { pg.dataset.built=''; pg.innerHTML=''; goPage('payouts-destinations'); }
}

function cwValidate(group, val) {
  if (!val.trim()) return null;
  if (group === 'solana') return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(val.trim());
  return /^0x[0-9a-fA-F]{40}$/.test(val.trim());
}

function cwInput(group, val) {
  CRYPTO_WALLETS[group].address = val;
  var valid = cwValidate(group, val);
  var ind = document.getElementById('cw-ind-' + group);
  if (ind) {
    if (!val.trim()) { ind.innerHTML = ''; return; }
    ind.innerHTML = valid
      ? '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" fill="#287a50" opacity=".12"/><path d="M3.5 6.5l2 2 4-4" stroke="#287a50" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="color:#287a50;font-size:11px;font-weight:500">Valid address format</span>'
      : '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" fill="#b03030" opacity=".12"/><path d="M4.5 4.5l4 4M8.5 4.5l-4 4" stroke="#b03030" stroke-width="1.3" stroke-linecap="round"/></svg><span style="color:#b03030;font-size:11px;font-weight:500">Invalid format</span>';
  }
}

function cwSave(group) {
  var w = CRYPTO_WALLETS[group];
  if (!w.address.trim()) { showToast('err', 'Wallet address required'); return; }
  if (!cwValidate(group, w.address)) {
    showToast('err', group === 'solana' ? 'Invalid Solana address' : 'Invalid EVM address (must start with 0x)');

  }
  CRYPTO_WALLETS[group].saved = true;
  showToast('add', (group === 'solana' ? 'Solana' : 'EVM') + ' wallet saved.');
  renderAccountPMPage();
}

function cwClear(group) {
  CRYPTO_WALLETS[group].address = '';

}

          return '<button onclick="(function(){var o=productPMOverrides.get(\''+productId+'\')||{};o.scope=\''+sc+'\';productPMOverrides.set(\''+productId+'\',o);renderNewProductPMs(\''+productId+'\');})()" style="padding:5px 12px;font-size:11.5px;font-weight:'+(on?'600':'400')+';font-family:var(--f);border:none;border-radius:6px;background:'+(on?'var(--tx)':'transparent')+';color:'+(on?'var(--bg)':'var(--tx2)')+';cursor:pointer;transition:all .1s">'+label+'</button>';

}

// ─── NEW PRODUCT PAYMENT METHODS ──────────────────────────────────────────────
function renderNewProductPMs(productId) {
  var area = document.getElementById('np-pm-' + productId);
  if (!area) return;

  // In 'account' scope mode - all products forced to account settings, no override
  if (pmScope === 'account') {
    var pills = [];
    if (pmState.cards) pills.push({label:'All cards', color:'#3d5a80'});
    if (pmState.bank) pills.push({label:'Bank transfer', color:'#287a50'});
    if (pmState.crypto) {
      pmState.cryptoTokens.forEach(function(tid) {
        var tok = CRYPTO_TOKENS.find(function(t){ return t.id===tid; });
        if (tok) pills.push({label:tok.name, color:tok.color});
      });
    }
    var pillsHtml = pills.length
      ? pills.map(function(p){
          return '<div style="display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;background:var(--bll);border:1px solid var(--blb);font-size:11px;font-weight:500;color:var(--bl)">' +
            '<span style="width:7px;height:7px;border-radius:50%;background:'+p.color+';display:inline-block;flex-shrink:0"></span>' + p.label +
          '</div>';
        }).join('')
      : '<span style="font-size:12px;color:var(--tx3)">No methods enabled - <span style="color:var(--bl);cursor:pointer;text-decoration:underline" onclick="goPage(\'payment-payment-config\')">configure payment config</span></span>';

    area.innerHTML =
      '<div style="padding:.75rem 1.125rem;background:var(--bll);border-bottom:1px solid var(--blb);font-size:11px;color:#2e4a6a;display:flex;align-items:center;gap:6px">' +
        '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#3d5a80" stroke-width="1.2"/><path d="M6 5v4M6 3.5v.5" stroke="#3d5a80" stroke-width="1.2" stroke-linecap="round"/></svg>' +
        'Methods managed at account level · <span style="text-decoration:underline;cursor:pointer" onclick="goPage(\'payment-payment-config\')">Edit payment config</span>' +
      '</div>' +
      '<div style="padding:.875rem 1.125rem;display:flex;flex-wrap:wrap;gap:7px">' + pillsHtml + '</div>';
    return;
  }

  // In 'product' scope mode - show account/custom toggle
  var ov = productPMOverrides.get(productId) || {scope:'account', state: clonePmState(pmState)};
  var isInheriting = ov.scope === 'account';
  var st = isInheriting ? pmState : ov.state;

  var html = '<div class="pm-scope-bar">' +
    '<div class="pm-scope-select">' +
      '<button class="pm-scope-opt ' + (isInheriting ? 'on' : '') + '" onclick="setPMScopeForProduct(\'' + productId + '\',\'account\');renderNewProductPMs(\'' + productId + '\')">Account defaults</button>' +
      '<button class="pm-scope-opt ' + (!isInheriting ? 'on' : '') + '" onclick="setPMScopeForProduct(\'' + productId + '\',\'product\');renderNewProductPMs(\'' + productId + '\')">Custom for this product</button>' +
    '</div>' +
    (isInheriting ? '<span style="font-size:11px;color:var(--tx3);margin-left:8px"><span style="color:var(--bl);cursor:pointer;text-decoration:underline" onclick="goPage(\'payment-payment-config\')">Edit payment config</span></span>' : '') +
  '</div>';

  if (isInheriting) {
    var pills2 = [];
    if (st.cards) pills2.push({label:'All cards', color:'#3d5a80'});
    if (st.bank) pills2.push({label:'Bank transfer', color:'#287a50'});
    if (st.crypto) {
      st.cryptoTokens.forEach(function(tid) {
        var tok = CRYPTO_TOKENS.find(function(t){ return t.id===tid; });
        if (tok) pills2.push({label:tok.name, color:tok.color});
      });
    }
    html += '<div style="padding:.875rem 1.125rem;display:flex;flex-wrap:wrap;gap:7px">';
    if (!pills2.length) {
      html += '<span style="font-size:12px;color:var(--tx3)">No methods enabled at account level.</span>';
    } else {
      pills2.forEach(function(p) {
        html += '<div style="display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;background:var(--bll);border:1px solid var(--blb);font-size:11px;font-weight:500;color:var(--bl)">' +
          '<span style="width:7px;height:7px;border-radius:50%;background:'+p.color+';display:inline-block;flex-shrink:0"></span>' + p.label +
        '</div>';
      });
    }
    html += '</div>';
  } else {

function npToggleIntegDropdown() {
  var dd   = document.getElementById('np-integ-dropdown');
  var chev = document.getElementById('np-integ-chev');
  if (!dd) return;
  var isOpen = dd.style.display !== 'none';
  dd.style.display = isOpen ? 'none' : 'block';
  if (chev) chev.style.transform = isOpen ? '' : 'rotate(180deg)';
  if (!isOpen) {
    setTimeout(function() {
      var close = function(e) {
        var dd2 = document.getElementById('np-integ-dropdown');
        var tr2 = document.getElementById('np-integ-trigger');
        if (dd2 && !dd2.contains(e.target) && (!tr2 || !tr2.contains(e.target))) {
          npCloseIntegDropdown();
        }
        document.removeEventListener('click', close);
      };
      document.addEventListener('click', close);
    }, 10);
  }
}

function npCloseIntegDropdown() {
  var dd   = document.getElementById('np-integ-dropdown');
  var chev = document.getElementById('np-integ-chev');
  if (dd) dd.style.display = 'none';
  if (chev) chev.style.transform = '';
}

  if (wrap) { wrap.innerHTML = npIntegrationDropdownUI(); }
  if (panel) { panel.style.display = val ? 'block' : 'none'; if (val) panel.innerHTML = npIntegrationPanel(val); }
}

    return matchQ && matchS;
  });

function goPage(id) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  var pg = document.getElementById('p-'+id);
  if (!pg) {
    pg = document.createElement('div');
    pg.className = 'page';
    pg.id = 'p-'+id;
    document.querySelector('.main').appendChild(pg);
  }
  pg.classList.add('on');

  if (!pg.dataset.built) {
    if (id==='home') { buildHome(); pg.dataset.built='1'; }
    else if (id==='account') { buildAccountPage(); pg.dataset.built='1'; }
    else if (id==='connections-overview') { if (!pg.dataset.built) buildConnectionsPage(); }
    else if (id==='connections-api') { pg.innerHTML = buildConnectionsApiPage(); pg.dataset.built='1'; setTimeout(renderIcons,20); }
    else if (id==='analytics-overview') { pg.innerHTML = '<div class="ph"><h2>Overview</h2></div>' + buildAnalyticsOverview(); pg.dataset.built='1'; }
    else if (id==='product-discounts') { pg.innerHTML = '<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><h2>Discounts</h2><p>Percentage or fixed codes, per product or global.</p></div><button class="btn btn-p btn-sm" onclick="showDiscountModal()">+ New discount</button></div>' + buildDiscountsContent(); pg.dataset.built='1'; }
    else if (id==='affiliate-overview') {
      if (!pg.dataset.built) { pg.innerHTML = '<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><h2>Affiliate program</h2><p>Track performance, manage partners and pay commissions.</p></div><button class="btn btn-p btn-sm" onclick="showInviteAffModal()">+ Invite affiliate</button></div>' + buildAffiliateOverview(); pg.dataset.built='1'; }
    }
    else if (id==='affiliate-affiliates') {
      pg.innerHTML = '<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><h2>Affiliates</h2><p>Manage your affiliate partners.</p></div><button class="btn btn-p btn-sm" onclick="showInviteAffModal()">+ Invite affiliate</button></div>' + buildAffiliatesContent(); pg.dataset.built='1';
    }
    else if (id==='affiliate-commissions') {
      pg.innerHTML = '<div class="ph"><h2>Commissions</h2><p>Review, approve and pay commissions.</p></div>' + buildCommissionsContent(); pg.dataset.built='1';
    }
    else if (id==='affiliate-setup') {
      buildAffSetupPage();
    }
    else if (id==='config-customize') { goPage('customize'); return; }
    else if (id==='product-newproduct') { buildNewProductPage(); pg.dataset.built='1'; }
    else if (id==='notifications-channels') { buildNotifPage(); pg.dataset.built='1'; }
    else if (id==='customize') { buildCustomizePage(); pg.dataset.built='1'; }
    else {
      var pc = PAGE_CONTENT[id];
      if (pc) {
        var b = pc.b==='TX_TABLE' ? buildTxContent() : pc.b==='DECLINE' ? buildDeclineContent() : pc.b==='PM_METHODS_PAGE' ? '' : pc.b==='DESTINATIONS' ? buildPayoutsDestinationsContent() : pc.b;
        pg.innerHTML = pc.b==='PM_METHODS_PAGE' ? '' : ('<div class="ph"><h2>'+pc.t+'</h2></div>'+b);
        pg.dataset.built='1';

        if (id === 'payouts-receiving') {
          pg.innerHTML = '<div class="ph"><h2>Crypto receiving addresses</h2><p>Direct wallet-to-wallet · no settlement delay.</p></div>' + buildCryptoReceivingContent();
          pg.dataset.built = '1';
        }
        if (id === 'product-products') {
          // Always rebuild so period/tab/page state is fresh
          pg.innerHTML = '<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><h2>Products</h2><p>Your product catalog · subscriptions, one-times, lifetime deals.</p></div></div>' + buildProductsContent();
          if (!CHECKLIST.productCreated) {
            CHECKLIST.productCreated = true;
          }
        }
        if (id === 'payment-payment-config') {
          renderAccountPMPage();
        }
      }
    }
  } else {
    if (id==='customize') buildCustomizePage();
    if (id==='analytics-overview') { pg.dataset.built=''; pg.innerHTML=''; goPage(id); return; }
    if (id==='product-newproduct') { pg.dataset.built=''; pg.innerHTML=''; goPage(id); return; }
    if (['payouts-destinations','payment-payment-config','affiliate-affiliates','affiliate-commissions','affiliate-setup','affiliate-overview'].indexOf(id)!==-1) { pg.dataset.built=''; pg.innerHTML=''; goPage(id); return; }
  }

  var EXTRA_TITLES = {'account':'Account verification','connections-overview':'Integration','notifications-channels':'Notifications','product-newproduct':'New product','product-discounts':'Discounts','analytics-overview':'Analytics - Overview'};
  var title = id==='home'?'Home':id==='customize'?'Customize sidebar':EXTRA_TITLES[id]||PAGE_CONTENT[id]?((EXTRA_TITLES[id]||PAGE_CONTENT[id].t)):id.replace(/-/g,' ');
  document.getElementById('page-title').textContent = title;

  document.querySelectorAll('.ni,.ni-sub,.grp-hdr').forEach(function(b){b.classList.remove('on');});
  if (id==='home') document.getElementById('ni-home').classList.add('on');
  if (id==='account') { var an=document.getElementById('ni-account'); if(an) an.style.opacity='1'; }
  var sub = document.getElementById('sub-'+id);
  if (sub) sub.classList.add('on');
}

function buildHomeConnCards(ucs) {
  // Determine which connection cards to show based on selected use cases
  var show = { api: false, paylink: false };

  ucs.forEach(function(uc) {
    if (uc === 'saas')      { show.api = true; }
    if (uc === 'paylink')   { show.paylink = true; }

  });

  // If nothing selected yet, show all
  if (!ucs.length) { show.api = true; show.paylink = true; }

  var cards = [
    { id:'api',
      label:'API',
      tag:'DEVELOPER',
      tagColor:'#3d5a80',
      desc:'Build custom payment flows, webhooks, and integrations with full programmatic control.',
      status:'Active', statusColor:'var(--g)',
      ico:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><rect x="1" y="5" width="22" height="14" rx="2"/><path d="M6 10l3 3-3 3M12 15h6"/></svg>',
    },
    { id:'paylink',
      label:'Paylink',
      tag:'NO-CODE',
      tagColor:'#287a50',
      desc:'A shareable payment page in 60 seconds. No code needed · link, email, or embed.',
      status:'Not connected', statusColor:'var(--bd2)',
      ico:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
    },

  ].filter(function(c) { return show[c.id]; });

  if (!cards.length) return '';

  var mkCard = function(c) {
    return '<div onclick="showConnModal(\''+c.id+'\')" style="display:flex;align-items:center;gap:12px;padding:.875rem 1.125rem;border:1px solid var(--bd);border-radius:10px;background:var(--bg);cursor:pointer;transition:box-shadow .15s" onmouseover="this.style.boxShadow=\'var(--sh2)\'" onmouseout="this.style.boxShadow=\'none\'">' +
      '<div style="width:36px;height:36px;border-radius:9px;background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+c.ico+'</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="display:flex;align-items:center;gap:7px;margin-bottom:2px">' +
          '<span style="font-size:12.5px;font-weight:700">'+c.label+'</span>' +

        '<div style="font-size:11.5px;color:var(--tx3);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.desc+'</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:5px;flex-shrink:0">' +
        '<span style="width:6px;height:6px;border-radius:50%;background:'+c.statusColor+'"></span>' +
        '<span style="font-size:11px;color:var(--tx3)">'+c.status+'</span>' +

      '</div>' +

    '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:8px">Your integrations</div>' +

          '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="opacity:.4;flex-shrink:0"><path d="M6 8a2.5 2.5 0 0 0 3.54 0l1.5-1.5a2.5 2.5 0 0 0-3.54-3.54l-.86.85" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M8 6a2.5 2.5 0 0 0-3.54 0L3 7.5A2.5 2.5 0 0 0 6.54 11l.85-.86" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>'+
          '<span style="font-family:var(--m);font-size:12px;color:var(--tx2)">suby.fi/affiliates/join</span>'+
        '</div>'+
        '<button class="btn btn-sm" onclick="showToast(\'add\',\'Link copied\')">Copy</button>'+
      '</div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:1.25rem">'+
      '<div class="ch"><span class="ct">Commission</span></div>'+
      row('Type','<div style="display:flex;gap:8px">'+typeTile('percent','Percentage')+typeTile('flat','Flat rate')+'</div>')+
      row('Rate',num(p.commissionRate,'commissionRate',p.commissionType==='percent'?'% of sale':'USD per conversion'))+
      row('Duration',sel(p.commissionDuration,[['first','First payment only'],['months','Fixed months'],['lifetime','Lifetime (recurring)']],'commissionDuration')+(p.commissionDuration==='months'?'<div style="margin-top:8px">'+num(p.commissionMonths,'commissionMonths','months')+'</div>':''))+
    '</div>'+
    '<div class="card" style="margin-bottom:1.25rem">'+
      '<div class="ch"><span class="ct">Tracking &amp; payouts</span></div>'+
      row('Cookie duration',num(p.cookieDays,'cookieDays','days · attribution window'))+
      row('Minimum payout','<div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--tx3)">$</span>'+num(p.minPayout,'minPayout','USD minimum before payout')+'</div>')+
      row('Self-referral',tgl(p.selfReferral,'selfReferral')+'<div style="margin-top:4px;font-size:11.5px;color:var(--tx3)">Allow affiliates to earn commission on their own purchases</div>')+
    '</div>'+
    '<div style="display:flex;justify-content:flex-end;gap:8px">'+
      '<button class="btn" onclick="showToast(\'add\',\'Discarded\')">Discard</button>'+
      '<button class="btn btn-p" onclick="showToast(\'add\',\'Program saved\')">Save changes</button>'+
    '</div>'+
  '</div>';
}

function buildAffSetupPage() {
  var pg = document.getElementById('p-affiliate-setup');
  if (!pg) return;
  pg.innerHTML = '<div class="ph"><h2>Program setup</h2><p>Configure commission, tracking and payout rules.</p></div>' + buildAffSetupContent();
  pg.dataset.built = '1';
}


// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(type, msg) {
  var t = document.getElementById('toast');
  if (!t) return;
  document.getElementById('t-ico').innerHTML = type==='add'
    ? '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3 3 6-5" stroke="#6abf8a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    : '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 2.5l8 8M10.5 2.5l-8 8" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/></svg>';
  document.getElementById('t-msg').textContent = msg;
  t.classList.add('on');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('on'); }, 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init() {
  // Apply default preset (saas) to populate sidebar
  applyPreset(['saas']);
  // Build home page
  goPage('home');
  // Update account badge
  updateAcctBadge();
})();
</script>
